spring.application.name=quizmaster
server.port=${BE_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:quizmaster}?currentSchema=${DB_SCHEMA:public}
spring.datasource.username=${DB_USER:quizmaster}
spring.datasource.password=${DB_PASS:quizmaster}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.schemas=${DB_SCHEMA:public}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}

feature.flag=${FEATURE_FLAG:false}
ai.token=${OPENROUTER_API_KEY:}
ai.model=${OPENROUTER_MODEL:openai/gpt-5.4}
ai.max-tokens=${OPENROUTER_MAX_TOKENS:8192}
ai.embedding.model=${OPENROUTER_EMBEDDING_MODEL:openai/text-embedding-3-small}
ai.embedding.similarity-threshold=${AI_EMBEDDING_SIMILARITY_THRESHOLD:0.90}
