name: CI

on:
  push:
    branches:
      - master
      - devcontainer
      - ci-test-report
  workflow_dispatch:

jobs:
  build:
    permissions:
      checks: write
      contents: read
      actions: read
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/scrumdojo/dev-quizmaster:v4
      options: --user dev
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    env:
      # GitHub Actions overrides HOME to /github/home
      HOME: /home/dev
    defaults:
      run:
        shell: zsh -e {0}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quizmaster
          POSTGRES_PASSWORD: quizmaster
          POSTGRES_DB: quizmaster
        options: >-
          --health-cmd "pg_isready -U quizmaster -d quizmaster"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install frontend dependencies and Playwright
        run: pnpm install:all

      - name: Type check & lint & format frontend + specs + MCP
        run: pnpm code:ci

      - name: Run MCP tests
        run: pnpm test:mcp

      - name: Build frontend
        run: pnpm build:ci:fe

      - name: Run backend tests
        run: pnpm test:be

      - name: Run end-to-end tests
        run: pnpm test:e2e:ci

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/build/reports/tests/test/
            backend/build/test-results/test/

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            specs/playwright-report/
            specs/test-results/

      - name: Publish backend test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Backend Tests
          path: backend/build/test-results/test/*.xml
          reporter: java-junit

      - name: Publish E2E test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: E2E Tests
          path: specs/test-results/results.xml
          reporter: jest-junit
